# orchestrator.yaml
#
# Maps semantic model roles to provider+model chains.
# The orchestrator tries primary first, then walks fallbacks in order.
#
# Model spec format: "model-name@provider"
# Supported providers: anthropic | openai | openrouter | deepseek | mistral | gemini | ollama | openai_compat
#
# Set ORCHESTRATOR_CONFIG=./orchestrator.yaml to activate this file.
# Explicit PROVIDER / REVIEW_MODEL / SMALL_MODEL env vars override role primaries
# while keeping the fallbacks and role limits below.

roles:

  # ── reasoner ─────────────────────────────────────────────────────────────
  # Step 5: Review Agent — code-review reasoning over selected evidence.
  # The local harness benchmarks selected DeepSeek Coder V2 16B as the primary
  # review model, with the 16k Qwen coder model as fallback.
  reasoner:
    primary: "deepseek-coder-v2:16b@ollama"
    fallbacks:
      - "qwen2.5-coder-7b-16k:latest@ollama"
    max_tokens: 4096
    parallel: true
    max_parallel: 4

  # ── formatter ────────────────────────────────────────────────────────────
  # Step 6 and operator chat — structured Markdown/status explanations.
  # Keep this 16k-capable for operator context; 7B instruct is fallback.
  formatter:
    primary: "qwen2.5-coder-7b-16k:latest@ollama"
    fallbacks:
      - "qwen2.5-coder:7b-instruct-q4_K_M@ollama"
    max_tokens: 2048

  # ── embedder ─────────────────────────────────────────────────────────────
  # Used by MemPalace/Ollama-backed retrieval where embeddings are enabled.
  embedder:
    primary: "nomic-embed-text:latest@ollama"
    max_tokens: 1024
